name: hardwareos
description: "HardwareOS — Multi-Tenant SaaS ERP for Hardware Stores"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase core
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3

  # Navigation
  go_router: ^14.3.0

  # State management
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1

  # UI & Fonts
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

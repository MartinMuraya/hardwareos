name: Deploy → Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  validate:
    name: Pre-deploy validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test -- --ci --coverage

  approval:
    name: Manual approval gate
    needs: [validate]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://hardwareos.com

    steps:
      - name: Wait for approval
        run: echo "Deployment approved — proceeding."

  deploy:
    name: Deploy to Production
    needs: [approval]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - run: npm ci

      - name: Deploy Functions to Production
        run: npx firebase-tools deploy --only functions --project hardwareos-prod --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore Rules & Indexes
        run: npx firebase-tools deploy --only firestore --project hardwareos-prod
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
